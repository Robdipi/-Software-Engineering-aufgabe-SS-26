stryker4s {
  # Nur die getestete Fachlogik und den Controller mutieren.
  # View, GUI, TUI, AppModule und main.scala sind damit nicht Teil des Scores.
  mutate = [
    "src/main/scala/de/htwg/se/machikoro/remake/model/**/*.scala",
    "src/main/scala/de/htwg/se/machikoro/remake/controller/**/*.scala"
  ]

  test-filter = ["*Spec"]
  reporters = ["console", "html"]
  scala-dialect = "scala3"
  concurrency = 1

  thresholds {
    high = 90
    low = 80
    break = 0
  }
}
