name: Scala CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - name: Install sbt
        run: |
          curl -fL https://github.com/sbt/sbt/releases/download/v1.12.6/sbt-1.12.6.tgz | tar xzf -
          echo "$PWD/sbt/bin" >> $GITHUB_PATH

      - name: Verify sbt
        run: sbt sbtVersion

      - name: Compile
        run: sbt compile

      - name: Run Tests
        run: sbt test

      - name: Coverage
        run: sbt clean coverage test coverageReport

      - name: Upload Coverage to Coveralls
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
        run: sbt coveralls

      - name: Run Mutation Tests
        run: sbt stryker4s
